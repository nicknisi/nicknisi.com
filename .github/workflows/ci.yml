name: CI

on:
  push:
    branches: [main]
  pull_request:

# Allow one concurrent run per ref; cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the pnpm version pinned in package.json's "packageManager" field.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generates content-collection types (astro:content). Required before
      # `tsc --noEmit`, otherwise getCollection() results type as `any`.
      - name: Sync Astro types
        run: pnpm exec astro sync

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
